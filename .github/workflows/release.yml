name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  MIX_ENV: prod
  OTP_VERSION: "27.3"
  ELIXIR_VERSION: "1.18.3"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            target: linux-amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            target: linux-arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Erlang & Elixir
        uses: erlef/setup-beam@aee99db9678990940a1e45b419520e498c2a21dc # v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ matrix.target }}-mix-prod-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ matrix.target }}-mix-prod-

      - name: Install deps
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod

      - name: Compile
        run: mix compile

      - name: Build release
        run: mix release karkhana

      - name: Package tarball
        run: |
          cd _build/prod/rel
          tar czf karkhana-${{ github.ref_name }}-${{ matrix.target }}.tar.gz karkhana/

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: karkhana-${{ matrix.target }}
          path: elixir/_build/prod/rel/karkhana-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
